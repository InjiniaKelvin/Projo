<!DOCTYPE html>
<html>
<head>
    <title>QuickFix API Test</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>QuickFix API Web Test</h1>
    
    <div id="results"></div>
    
    <button onclick="testBackendHealth()">Test Backend Health</button>
    <button onclick="testUserRegistration()">Test User Registration</button>
    <button onclick="testBookingSubmission()">Test Booking Submission</button>
    <button onclick="clearResults()">Clear Results</button>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentToken = null;

        function addResult(title, success, data) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test ${success ? 'success' : 'error'}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            results.appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testBackendHealth() {
            try {
                console.log('Testing backend health...');
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (response.ok && data.success) {
                    addResult('✅ Backend Health Test', true, data);
                } else {
                    addResult('❌ Backend Health Test', false, data);
                }
            } catch (error) {
                addResult('❌ Backend Health Test', false, { 
                    error: error.message,
                    details: 'CORS or network error - check console'
                });
                console.error('Health test error:', error);
            }
        }

        async function testUserRegistration() {
            try {
                console.log('Testing user registration...');
                const timestamp = Date.now();
                const userData = {
                    firstName: 'Web',
                    lastName: 'Tester',
                    email: `web.test.${timestamp}@example.com`,
                    password: 'TestPassword123',
                    phoneNumber: `070${timestamp.toString().slice(-7)}`,
                    role: 'client'
                };

                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    currentToken = data.data.tokens.accessToken;
                    addResult('✅ User Registration Test', true, {
                        success: true,
                        userId: data.data.user.id,
                        email: data.data.user.email,
                        tokenReceived: !!currentToken
                    });
                } else {
                    addResult('❌ User Registration Test', false, data);
                }
            } catch (error) {
                addResult('❌ User Registration Test', false, { 
                    error: error.message,
                    details: 'CORS or network error - check console'
                });
                console.error('Registration test error:', error);
            }
        }

        async function testBookingSubmission() {
            if (!currentToken) {
                addResult('❌ Booking Submission Test', false, { 
                    error: 'No auth token - run registration test first' 
                });
                return;
            }

            try {
                console.log('Testing booking submission...');
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                
                const bookingData = {
                    serviceType: 'plumbing',
                    serviceDescription: 'Fix kitchen faucet from web',
                    urgency: 'medium',
                    clientDetails: {
                        name: 'Web Test User',
                        phoneNumber: '0712345678',
                        email: 'webtest@example.com'
                    },
                    location: {
                        city: 'Nairobi',
                        county: 'Nairobi',
                        constituency: 'Westlands',
                        ward: 'Kitisuru',
                        road: 'Web Test Avenue',
                        preciseLocation: 'Near web test landmark'
                    },
                    scheduling: {
                        preferredDate: tomorrow.toISOString().split('T')[0],
                        preferredTimeSlot: {
                            start: '10:00',
                            end: '12:00'
                        }
                    }
                };

                const response = await fetch(`${API_BASE}/bookings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify(bookingData)
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    addResult('✅ Booking Submission Test', true, {
                        success: true,
                        bookingId: data.data.bookingId,
                        serviceId: data.data.serviceId,
                        status: data.data.status,
                        message: 'Booking submitted successfully from web!'
                    });
                } else {
                    addResult('❌ Booking Submission Test', false, data);
                }
            } catch (error) {
                addResult('❌ Booking Submission Test', false, { 
                    error: error.message,
                    details: 'CORS or network error - check console'
                });
                console.error('Booking test error:', error);
            }
        }

        // Auto-run health test on load
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(testBackendHealth, 1000);
        });
    </script>
</body>
</html>
